name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    uses: ./.github/workflows/reusable-agent-ci.yml
    with:
      run_promptfoo: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    secrets: inherit
